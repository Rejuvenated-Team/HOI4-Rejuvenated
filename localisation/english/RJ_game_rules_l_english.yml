 IRE_AI_BEHAVIOR: "@IRE Ireland"
 RULE_OPTION_HISTORICAL_IRE_AI_DESC: "Ireland will keep with the republican Fianna Fáil, and seek to maintain neutrality from the conflicts that erupt in Europe"
 RULE_OPTION_IRE_FINE_GAEL_AI: "Confirm ties to the Commonwealth"
 RULE_OPTION_IRE_FINE_GAEL_AI_DESC: "W. T. Cosgrove will lead the Fine Gael to an electoral victory against the Fianna Fáil, and will seek to allign Ireland with the Commonwealth"
 RULE_OPTION_IRE_OPPORTUNITY: "Ireland's Opportunity"
 RULE_OPTION_IRE_OPPORTUNITY_DESC: "Using Britain's war with Germany as a distraction, Eamon de Valera will commit Ireland to the war on the side of the Axis to gain Northern Ireland"
 RULE_OPTION_IRE_DEMOCRATIC_JOIN_ALLIES: "Join Allies"
 RULE_OPTION_IRE_DEMOCRATIC_JOIN_ALLIES_DESC: "Eamon de Valera will lead Ireland to independence, and then commit it to the fight for global democracy, joining the allies"
 RULE_OPTION_FASCISM_IRE_AI: "The Corporate Party"
 RULE_OPTION_FASCISM_IRE_AI_DESC: "Eoin O'Duffy will lead the corporate party to seize control of Ireland with IRA support, and seek to fight Britain."
 RULE_OPTION_IRE_COMMUNISM: "Irish Worker's League"
 RULE_OPTION_IRE_COMMUNISM_DESC: "Jim Larkin, Peadar O'Donnel and others will reform the Irish Workers League, empowering the Communist party with the support of the IRA, and seek to join the international struggle."
 RULE_OPTION_IRE_MONARCHISM: "A King of our Own"
 RULE_OPTION_IRE_MONARCHISM_DESC: "Francis Stuart will rally the monarchist society against the Free Sate, overthrowing it and attempting to establish an independent kingdom of Ireland"
