 rj_IRE_GATHERING_STORM_DESC: "Emerging from a period of great instability following the 1919-21 War of independence, and subsequently the 1921-22 Irish Civil War, Ireland sits at a crossroads.\n\n Eamon de Valera has plans for the establishment of an independent republic of Ireland, whilst the Fine Gael in oppsition support the status quo of the Anglo-Irish treaty, favouring remaining a member of the commonwealth. Beyond the mainstream parties however, the IRA, and latent fascist and communist movments could still seek to alter Ireland's path..."
